<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <img src="paper-ball.svg" alt="Boulette de papier">
        <h2 class="fw-bold">Paper Quizz</h2>
        <p class="text-muted">Interface d'administration</p>
      </div>

      <div *ngIf="error" class="alert alert-danger py-2" role="alert">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="professeur@exemple.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Mot de passe</label>
          <input
            type="password"
            id="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="loading || !loginForm.form.valid"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

    </div>
  </div>
</div>
